<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Number Line</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="controls" aria-labelledby="controls-title">
      <div>
        <p class="eyebrow">Number line explorer</p>
        <h1 id="controls-title">Tenths and hundredths number line</h1>
      </div>

      <label class="start-control" for="start-number">
        Starting number
        <input id="start-number" type="number" step="1" value="0" />
      </label>

      <div class="toggle-group" aria-label="Tick mark options">
        <label class="toggle">
          <input id="tenths-toggle" type="checkbox" />
          <span>Show tenths</span>
        </label>
        <label class="toggle">
          <input id="hundredths-toggle" type="checkbox" />
          <span>Show hundredths</span>
        </label>
      </div>
    </section>

    <section class="number-line-card" aria-label="Interactive number line">
      <div id="number-line" class="number-line" role="group" aria-label="Clickable number line tick marks"></div>
    </section>

    <section class="selection-panel" aria-live="polite">
      <span>Selected tick:</span>
      <strong id="selected-value">Click a tick mark</strong>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
